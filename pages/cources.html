<!DOCTYPE html>
<html lang="as">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>সকলো পাঠ্যক্ৰম — পঢ়া Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
<link rel="stylesheet" href="../css/style.css" />
</head>
<body data-theme="dark">
<header class="nav glass">
  <a href="../index.html" class="logo"><span class="logo-mark">প</span><span class="logo-text">পঢ়া <em>Hub</em></span></a>
  <nav class="nav-links"><a href="../index.html">ঘৰ</a><a href="courses.html">পাঠ্যক্ৰম</a></nav>
  <div class="nav-actions"><a href="login.html" class="btn btn-ghost">প্ৰৱেশ</a></div>
</header>
<section class="section" style="padding-top:160px">
  <div class="section-head"><span class="eyebrow">পাঠ্যক্ৰম</span><h2>সকলো <span class="gradient-text">পাঠ্যক্ৰম</span></h2></div>
  <div class="courses-grid" id="grid"></div>
</section>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
const data=[
 ['Class 6','গণিত','#ff6b6b,#feca57'],['Class 7','বিজ্ঞান','#5f27cd,#48dbfb'],
 ['Class 8','অসমীয়া','#1dd1a1,#10ac84'],['Class 9','সমাজ বিজ্ঞান','#ee5a24,#ff9ff3'],
 ['Class 10','SEBA সম্পূৰ্ণ','#7c5cff,#22d3ee'],['Class 11','বিজ্ঞান শাখা','#ff5cae,#feca57'],
 ['Class 12','AHSEC','#10ac84,#48dbfb'],['APSC','প্ৰস্তুতি','#ff9e00,#ff5cae'],
 ['JEE/NEET','বিজ্ঞান','#5f27cd,#ff6b6b'],['ইংৰাজী','স্পোকেন','#22d3ee,#7c5cff']
];
const g=document.getElementById('grid');
data.forEach(([t,s,c],i)=>{
  const el=document.createElement('a');el.className='course-card';el.setAttribute('data-aos','zoom-in');el.setAttribute('data-aos-delay',i*50);
  el.innerHTML=`<div class="thumb" style="--g:linear-gradient(135deg,${c})"></div><h3>${t}</h3><p>${s}</p><div class="course-meta"><span>⭐ 4.${8+(i%2)}</span><span>${50+i*10} পাঠ</span></div>`;
  g.appendChild(el);
});
AOS.init({duration:700,once:true});
</script>
</body>
</html>
