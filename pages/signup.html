<!DOCTYPE html>
<html lang="as">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>পঞ্জীয়ন — পঢ়া Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css" />
</head>

<body data-theme="dark">

<div class="hero-bg" style="position:fixed;inset:0;z-index:0">
  <div class="orb orb-1"></div>
  <div class="orb orb-3"></div>
</div>

<div class="auth-wrap">

  <div class="auth-card glass">

    <a href="../index.html" class="logo" style="margin-bottom:24px">
  <img
    src="../assets/images/logo.png"
    alt="পঢ়া Hub Logo"
    class="site-logo"
  >
    </a>

    <h1>বিনামূলীয়া পঞ্জীয়ন</h1>
    <p class="sub">আজিৰে পৰা পঢ়া আৰম্ভ কৰক</p>

    <form id="signupForm">

      <div class="field">
        <label>পূৰ্ণ নাম</label>
        <input
          id="name"
          type="text"
          required
          placeholder="আপোনাৰ নাম"
        >
      </div>

      <div class="field">
        <label>ইমেইল</label>
        <input
          id="email"
          type="email"
          required
          placeholder="apuni@example.com"
        >
      </div>

      <div class="field">
        <label>পাছৱৰ্ড</label>
        <input
          id="password"
          type="password"
          required
          minlength="6"
          placeholder="••••••••"
        >
      </div>

      <button
        class="btn btn-primary"
        style="width:100%"
        type="submit">
        একাউণ্ট সৃষ্টি কৰক
      </button>

    </form>

    <div class="auth-foot">
      ইতিমধ্যে একাউণ্ট আছে?
      <a href="login.html">প্ৰৱেশ কৰক</a>
    </div>

  </div>

</div>

<script type="module" src="../js/signup.js"></script>

</body>
</html>
